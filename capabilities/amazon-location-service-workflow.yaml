naftiko: 1.0.0-alpha2
info:
  label: Amazon Location Service Workflow
  description: Unified workflow capability for Amazon Location Service combining resource management and operations.
  tags:
  - Amazon Location Service
  - AWS
  - Workflow
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: location-service
    baseUri: https://geo.us-east-1.amazonaws.com
    description: Amazon Location Service service.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: map-resources
      path: /maps
      description: Map resource management
      operations:
      - name: createmap
        method: POST
        description: Creates a map resource in your AWS account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listmaps
        method: GET
        description: Lists map resources in your AWS account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describemap
        method: GET
        description: Retrieves the map resource details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: location-service-api
    description: REST API for Amazon Location Service workflow.
    resources: []
  - type: mcp
    port: 9090
    namespace: location-service-mcp
    transport: http
    description: MCP server for Amazon Location Service.
    tools:
    - name: map-resources-create-map
      description: Creates a map resource in your AWS account.
      hints:
        readOnly: false
        idempotent: false
      call: location-service.createmap
      outputParameters:
      - type: object
        mapping: $.
    - name: map-resources-list-maps
      description: Lists map resources in your AWS account.
      hints:
        readOnly: true
        idempotent: true
      call: location-service.listmaps
      outputParameters:
      - type: object
        mapping: $.
    - name: map-resources-describe-map
      description: Retrieves the map resource details.
      hints:
        readOnly: true
        idempotent: true
      call: location-service.describemap
      outputParameters:
      - type: object
        mapping: $.
