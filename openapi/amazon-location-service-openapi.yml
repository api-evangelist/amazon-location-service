openapi: 3.1.0
info:
  title: Amazon Location Service API
  description: >-
    Amazon Location Service provides location-based services including maps,
    places, routes, trackers, and geofences. The API enables developers to add
    location functionality to applications for mapping, geocoding, routing,
    asset tracking, and geofencing use cases.
  version: '2020-11-19'
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/location/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  termsOfService: https://aws.amazon.com/service-terms/
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
externalDocs:
  description: Amazon Location Service API Reference
  url: https://docs.aws.amazon.com/location/latest/APIReference/Welcome.html
servers:
  - url: https://geo.{region}.amazonaws.com
    description: Amazon Location Service regional endpoint
    variables:
      region:
        default: us-east-1
        description: AWS region
        enum:
          - us-east-1
          - us-east-2
          - us-west-2
          - eu-west-1
          - eu-central-1
          - ap-northeast-1
          - ap-southeast-1
          - ap-southeast-2
          - ap-south-1
paths:
  /maps:
    post:
      operationId: CreateMap
      summary: Amazon Location Service Create a map resource
      description: Creates a map resource in your AWS account for rendering maps.
      tags:
        - Maps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - MapName
                - Configuration
              properties:
                MapName:
                  type: string
                  description: The name for the map resource.
                Configuration:
                  type: object
                  required:
                    - Style
                  properties:
                    Style:
                      type: string
                      description: The map style selected from an available data provider.
                Description:
                  type: string
                Tags:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '200':
          description: Successful response.
  /places/v0/indexes:
    post:
      operationId: CreatePlaceIndex
      summary: Amazon Location Service Create a place index resource
      description: Creates a place index resource for geocoding and reverse geocoding.
      tags:
        - Places
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - IndexName
                - DataSource
              properties:
                IndexName:
                  type: string
                DataSource:
                  type: string
                Description:
                  type: string
      responses:
        '200':
          description: Successful response.
  /places/v0/indexes/{IndexName}/search/text:
    post:
      operationId: SearchPlaceIndexForText
      summary: Amazon Location Service Search for places by text
      description: Geocodes free-form text to a place or address.
      tags:
        - Places
      parameters:
        - name: IndexName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Text
              properties:
                Text:
                  type: string
                BiasPosition:
                  type: array
                  items:
                    type: number
                MaxResults:
                  type: integer
      responses:
        '200':
          description: Successful response.
  /geofencing/v0/collections:
    post:
      operationId: CreateGeofenceCollection
      summary: Amazon Location Service Create a geofence collection
      description: Creates a geofence collection for managing and storing geofences.
      tags:
        - Geofencing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - CollectionName
              properties:
                CollectionName:
                  type: string
                Description:
                  type: string
      responses:
        '200':
          description: Successful response.
  /tracking/v0/trackers:
    post:
      operationId: CreateTracker
      summary: Amazon Location Service Create a tracker resource
      description: Creates a tracker resource for receiving and storing device position updates.
      tags:
        - Trackers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - TrackerName
              properties:
                TrackerName:
                  type: string
                Description:
                  type: string
      responses:
        '200':
          description: Successful response.
  /routes/v0/calculators:
    post:
      operationId: CreateRouteCalculator
      summary: Amazon Location Service Create a route calculator
      description: Creates a route calculator resource for calculating routes.
      tags:
        - Routes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - CalculatorName
                - DataSource
              properties:
                CalculatorName:
                  type: string
                DataSource:
                  type: string
                Description:
                  type: string
      responses:
        '200':
          description: Successful response.
components:
  schemas:
    Place:
      type: object
      properties:
        Label:
          type: string
        Geometry:
          type: object
          properties:
            Point:
              type: array
              items:
                type: number
        AddressNumber:
          type: string
        Street:
          type: string
        Municipality:
          type: string
        Region:
          type: string
        Country:
          type: string
        PostalCode:
          type: string
    Tag:
      type: object
      properties:
        Key:
          type: string
        Value:
          type: string
      required:
        - Key
        - Value
  securitySchemes:
    aws_sig_v4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication.
security:
  - aws_sig_v4: []
